<!DOCTYPE html>
<!--Deployed by Wanuja.-->
<html lang="en" translate="no" oncontextmenu="return false;">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HAPPY NEW YEAR!</title>
<link rel="icon" type="image/gif" href="happynewyear.gif">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=folded_hands" />
<link rel="stylesheet" href="style.css" />
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JKKSR78ZFW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-JKKSR78ZFW');
</script>

<style>
#icon {font-size: 50px;
       color: gold;}
#style {
    transition: color 0.5s ease; /* Smooth transition for color change */
  }
#img {
  /* scale the image nicely */
  background-color: none;
  position: absolute;
  top: 60%;
  left: 70%;
  transform: translate(-50%, -50%);
  z-index: 3;
  width: 60%;
  padding: 20px;
}
#title {
  /* scale the image nicely */
  background-color: none;
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  width: 50%;
  padding: 20px;
  text-align: center;
}
#text {
  background-color: rgb(0,0,0); /* Fallback color */
  background-color: rgba(0,0,0, 0.4); /* Black w/opacity/see-through */ 
  color: gold;
  font-family: sans-serif;
  font-weight: bold;
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4;
  width: 80%;
  padding: 20px;
  text-align: center;
}
h1 {font-size: 70px;
}
.bg-img {
        /* The image used */
  background-image: url("bg.jpg");
  
  /* Add the blur effect */
  filter: blur(0px);
  -webkit-filter: blur(0px);
  
  
  height: 1200px;
  width: 100%;
  
  /* Center and scale the image nicely */
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
    }
.sun {
  background-color: none; 
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 80%;
  padding: 20px;
  text-align: center;
}
.gap {
  line-height: 1.0;
  }
.row {
  opacity: 0;
  margin: 10px;
  transition: opacity 0.5s ease-in; /* Smooth fade in */
}
.show {
  opacity: 1; /* Class to trigger visibility */
}
</style>
</head>
<body>
<div class="bg-img">
<div class="sun">
<picture>
  <source srcset="https://fonts.gstatic.com/s/e/notoemoji/latest/1f31e/512.webp" type="image/webp">
  <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f31e/512.gif" alt="🌞" width="80%">
</picture>
</div>
<div id="container">
<div class="row" id="img"><img src="img.png" width="60%"/></div>
<div class="row" id="title"><img src="title.png" width="50%"/></div>
<div class="row" id="text">
  <br><br><br><br><br><br><br>
  <h1 style="display: none;">Sinhala & Tamil New Year</h1>
  <div class="row"><h1 style="font-size: 40px;">ලැබුවා වූ</h1></div>
  <div class="row"><h1 style="font-size: 40px;">මේ සිංහල සහ දෙමළ අලුත් අවුරුද්ද</h1></div>
  <div class="row"><h1>ජීවිතයේ ප්‍රීතිමත්ම</h1></div>
  <div class="row"><h1>සිංහල සහ දෙමළ</h1></div>
  <div class="row"><h1>අලුත් අවුරුද්ද</h1></div>
  <div class="row"><h1>වේවා!</h1></div>
  <div class="row"><p style="color: gold;font-family: sans-serif;font-size: 30px;"><span id="icon" class="material-symbols-outlined">folded_hands</span>FROM WANUJA DAMYURU.</p></div>
</div>
</div>
</div>
<script>
window.onload = function() {
  const rows = document.querySelectorAll('.row');
  rows.forEach((row, index) => {
    setTimeout(() => {
      row.classList.add('show');
    }, (index + 1) * 1000); // 1000ms = 1 second interval
  });
};
</script>
</body>
</html>
